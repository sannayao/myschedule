cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢婆班表小幫手 v2.0</title>
    <style>
        :root {
            --primary-color: #6a5acd;
            --bg-color: #f4f7f6;
            --fixed-staff-bg: #e8f5e9;
            --pt-staff-bg: #e3f2fd;
            --off-day-bg: #f5f5f5;
            --holiday-bg: #ffebee;
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); color: #333; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary-color); }
        .config-section { background: #fafafa; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        .input-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        .input-group { flex: 1 1 180px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-group { text-align: center; margin-bottom: 30px; }
        button { background: var(--primary-color); color: white; padding: 12px 50px; border: none; border-radius: 30px; font-size: 1.1em; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .weekday-header { background: var(--primary-color); color: white; padding: 10px; text-align: center; font-weight: bold; border-radius: 5px; }
        .day-box { min-height: 140px; border: 1px solid #eee; border-radius: 8px; padding: 10px; background: #fff; position: relative; }
        .date-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; margin-bottom: 8px; padding-bottom: 5px; }
        .date-num { font-weight: bold; font-size: 1.1em; }
        .status-select { font-size: 0.75em; padding: 2px; border-radius: 4px; border: 1px solid #ccc; }
        .day-rest { background-color: var(--off-day-bg); color: #999; }
        .day-temp-off { background-color: var(--holiday-bg); }
        .staff-tag { font-size: 0.85em; padding: 4px 6px; border-radius: 4px; margin-top: 4px; display: block; }
        .tag-fixed { background: var(--fixed-staff-bg); color: #2e7d32; border-left: 3px solid #2e7d32; }
        .tag-pt { background: var(--pt-staff-bg); color: #1565c0; border-left: 3px solid #1565c0; }
        .tag-none { background: #ffebee; color: #c62828; border-left: 3px solid #c62828; font-size: 0.8em; }
        .day-label { font-size: 0.75em; font-weight: bold; text-align: center; display: block; margin-top: 10px; }
        @media (max-width: 900px) { .calendar-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ 夢婆班表小幫手 v2.0 ✨</h1>
    <div class="config-section">
        <div class="input-row">
            <div class="input-group">
                <label>📅 選擇月份</label>
                <input type="month" id="scheduleMonth">
            </div>
        </div>
        <label>🚫 兼職禁排日期 (例如: 5,12)</label>
        <div class="input-row">
            <div class="input-group"><label>李葳</label><input type="text" id="off_李葳"></div>
            <div class="input-group"><label>鈺杰</label><input type="text" id="off_鈺杰"></div>
            <div class="input-group"><label>哲墉</label><input type="text" id="off_哲墉"></div>
            <div class="input-group"><label>森喜</label><input type="text" id="off_森喜"></div>
            <div class="input-group"><label>思岑</label><input type="text" id="off_思岑"></div>
        </div>
    </div>
    <div class="btn-group">
        <button onclick="generateCalendar()">生成雙人自動班表</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
</div>
<script>
    const ptNames = ['李葳', '鈺杰', '哲墉', '森喜', '思岑'];
    let customStatuses = {}; 

    function generateCalendar() {
        const monthInput = document.getElementById('scheduleMonth').value;
        if (!monthInput) return alert('請選擇月份');
        const [year, month] = monthInput.split('-').map(Number);
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        ['週日', '週一', '週二', '週三', '週四', '週五', '週六'].forEach(d => {
            const div = document.createElement('div');
            div.className = 'weekday-header';
            div.innerText = d;
            grid.appendChild(div);
        });

        const offDates = {};
        ptNames.forEach(name => {
            offDates[name] = document.getElementById(`off_${name}`).value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        });

        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        const shiftCounts = {};
        ptNames.forEach(name => shiftCounts[name] = 0);

        for (let i = 0; i < firstDay; i++) {
            const spacer = document.createElement('div');
            spacer.className = 'day-box';
            spacer.style.opacity = '0.3';
            grid.appendChild(spacer);
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dateObj = new Date(year, month - 1, day);
            const weekDay = dateObj.getDay();
            const dayBox = document.createElement('div');
            dayBox.className = 'day-box';
            
            // 優先讀取自定義狀態，否則使用預設值
            let status = customStatuses[day] || ((weekDay === 0 || weekDay === 1) ? 'rest' : 'work');
            
            renderDayContent(dayBox, month, day, weekDay, status, offDates, shiftCounts);
            grid.appendChild(dayBox);
        }
    }

    function renderDayContent(container, month, day, weekDay, status, offDates, shiftCounts) {
        container.className = 'day-box';
        if (status === 'rest') container.classList.add('day-rest');
        if (status === 'temp-off') container.classList.add('day-temp-off');

        let html = `
            <div class="date-header">
                <span class="date-num">${month}/${day}</span>
                <select class="status-select" onchange="updateDayStatus(${day}, this.value)">
                    <option value="work" ${status==='work'?'selected':''}>營業</option>
                    <option value="rest" ${status==='rest'?'selected':''}>例行店休</option>
                    <option value="temp-off" ${status==='temp-off'?'selected':''}>臨時店休</option>
                </select>
            </div>
        `;

        if (status === 'work') {
            html += `<div class="staff-tag tag-fixed">👤 Rin, 太乙</div>`;
            let availablePt = ptNames.filter(name => !offDates[name].includes(day));
            availablePt.sort((a, b) => shiftCounts[a] - shiftCounts[b]);
            let selected = availablePt.slice(0, 2);
            selected.forEach(name => {
                html += `<div class="staff-tag tag-pt">🌟 ${name}</div>`;
                shiftCounts[name]++;
            });
            if (selected.length < 2) html += `<div class="staff-tag tag-none">⚠️ 人手不足</div>`;
        } else {
            html += `<span class="day-label">${status === 'rest' ? '☕ 例行店休' : '🚫 臨時店休'}</span>`;
        }
        container.innerHTML = html;
    }

    window.updateDayStatus = function(day, newStatus) {
        customStatuses[day] = newStatus;
        generateCalendar();
    };

    const now = new Date();
    document.getElementById('scheduleMonth').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
</script>
</body>
</html>
